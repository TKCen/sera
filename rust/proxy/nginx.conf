# SERA Reverse Proxy — Routes migrated paths to Rust, remaining to TS
#
# Phase 5: Dual-run configuration
# - Rust server (sera-core-rs): port 3002
# - TS server (sera-core):      port 3001
# - Proxy:                       port 3000

upstream rust_backend {
    server sera-core-rs:3002;
}

upstream ts_backend {
    server sera-core:3001;
}

server {
    listen 3000;
    server_name _;

    # Health endpoints — always Rust
    location /api/health {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Migrated to Rust (Phase 4 complete) ──────────────────────────

    # Agent CRUD
    location /api/agents {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Provider management
    location /api/providers {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Budget and metering
    location /api/budget {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/metering {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Skills
    location /api/skills {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Schedules
    location /api/schedules {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Circles
    location /api/circles {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Sessions
    location /api/sessions {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Audit
    location /api/audit {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Secrets
    location /api/secrets {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Auth
    location /api/auth {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Memory
    location /api/memory {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Tasks
    location /api/agents/ {
        # Matches /api/agents/:id/tasks, /api/agents/:id/heartbeat, etc.
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Operator requests
    location /api/operator-requests {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Channels / notifications
    location /api/channels {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Webhooks
    location /api/webhooks {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Delegation
    location /api/delegation {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Registry
    location /api/registry {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # LLM proxy
    location /v1/llm/ {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 300s;
    }

    # Config / system
    location /api/config {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/system {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/federation {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/rt {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Newly migrated (stub replacements) ───────────────────────────

    # Sandbox
    location /api/sandbox {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Intercom
    location /api/intercom {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Chat (SSE streaming)
    location /api/chat {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # OpenAI compat (SSE streaming)
    location /v1/chat/completions {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Embedding
    location /api/embedding {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Knowledge
    location /api/knowledge {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Pipelines
    location /api/pipelines {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # MCP servers
    location /api/mcp-servers {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # LSP
    location /api/lsp {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Permission requests
    location /api/permission-requests {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Fallback to TS ───────────────────────────────────────────────

    location / {
        proxy_pass http://ts_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
