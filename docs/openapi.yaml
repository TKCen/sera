components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequestError:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: object

    OperatorIdentity:
      type: object
      properties:
        sub:
          type: string
        roles:
          type: array
          items:
            type: string
        authMethod:
          type: string
        email:
          type: string
        name:
          type: string

    EnrichedAgentInstance:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
        template_ref:
          type: string
        status:
          type: string
        circle:
          type: string
        lifecycle_mode:
          type: string
          enum: [persistent, ephemeral]
        icon:
          type: string
        sandbox_boundary:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentInstanceDb:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
        template_ref:
          type: string
        status:
          type: string
        circle:
          type: string
        lifecycle_mode:
          type: string
          enum: [persistent, ephemeral]
        overrides:
          type: object
        resolved_capabilities:
          type: object
        container_id:
          type: string
        workspace_used_gb:
          type: number
        parent_instance_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentManifest:
      type: object
      required: [apiVersion, kind, metadata]
      properties:
        apiVersion:
          type: string
          const: sera/v1
        kind:
          type: string
          const: Agent
        metadata:
          type: object
          required: [name, templateRef]
          properties:
            name:
              type: string
            displayName:
              type: string
            templateRef:
              type: string
            circle:
              type: string
        overrides:
          type: object

    AgentInstance:
      $ref: '#/components/schemas/AgentManifest'

    AgentTemplate:
      type: object
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion:
          type: string
          const: sera/v1
        kind:
          type: string
          const: AgentTemplate
        metadata:
          type: object
          required: [name]
          properties:
            name:
              type: string
            displayName:
              type: string
            icon:
              type: string
            builtin:
              type: boolean
            category:
              type: string
            description:
              type: string
        spec:
          type: object
          required: [lifecycle]
          properties:
            identity:
              type: object
              properties:
                role:
                  type: string
                principles:
                  type: array
                  items:
                    type: string
            model:
              type: object
              properties:
                provider:
                  type: string
                name:
                  type: string
                temperature:
                  type: number
                fallback:
                  type: array
                  items:
                    type: object
                    required: [provider, name]
                    properties:
                      provider:
                        type: string
                      name:
                        type: string
                      maxComplexity:
                        type: number
            sandboxBoundary:
              type: string
            policyRef:
              type: string
            capabilities:
              type: object
            lifecycle:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [persistent, ephemeral]
            skills:
              type: array
              items:
                type: string
            skillPackages:
              type: array
              items:
                type: string
            tools:
              type: object
              properties:
                allowed:
                  type: array
                  items:
                    type: string
                denied:
                  type: array
                  items:
                    type: string
            subagents:
              type: object
              properties:
                allowed:
                  type: array
                  items:
                    type: object
                    required: [templateRef]
                    properties:
                      templateRef:
                        type: string
                      maxInstances:
                        type: number
                      lifecycle:
                        type: string
                        enum: [persistent, ephemeral]
                        default: ephemeral
                      requiresApproval:
                        type: boolean
                        default: false
            resources:
              type: object
              properties:
                cpu:
                  type: string
                memory:
                  type: string
                maxLlmTokensPerHour:
                  type: number
                maxLlmTokensPerDay:
                  type: number
            workspace:
              type: object
            memory:
              type: object

    AgentTemplateDb:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        builtin:
          type: boolean
        category:
          type: string
        spec:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AddProvider:
      type: object
      required: [modelName]
      properties:
        modelName:
          type: string
        api:
          type: string
          enum: [openai-completions, anthropic-messages]
          default: openai-completions
        provider:
          type: string
        baseUrl:
          type: string
          format: uri
        apiKey:
          type: string
        apiKeyEnvVar:
          type: string
        description:
          type: string

    DynamicProvider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        baseUrl:
          type: string
        apiKey:
          type: string
        enabled:
          type: boolean
        intervalMs:
          type: integer
        description:
          type: string

    AddDynamicProvider:
      type: object
      required: [id, name, type, baseUrl]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          const: lm-studio
