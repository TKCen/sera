name: CI — Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sera
          POSTGRES_PASSWORD: sera
          POSTGRES_DB: sera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (core)
        run: npm run test --workspace=core
        env:
          DATABASE_URL: postgres://sera:sera@localhost:5432/sera_test

      - name: Test (web)
        run: npm run test --workspace=web

  label-agent-pr:
    if: >-
      github.event_name == 'pull_request' &&
      (startsWith(github.head_ref, 'claude/') ||
       startsWith(github.head_ref, 'jules/') ||
       startsWith(github.head_ref, 'gemini/') ||
       startsWith(github.head_ref, 'antigravity/'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['agent-work']
            });
