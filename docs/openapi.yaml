openapi: 3.1.0
info:
  title: SERA Core API
  description: |
    Sandboxed Extensible Reasoning Agent — REST API for the sera-core orchestrator.
    All endpoints are prefixed with the service base URL (default: http://localhost:3001).
    Authentication: Bearer token (API key or session token) unless marked public.
  version: 0.2.0
  license:
    name: MIT

servers:
  - url: http://localhost:3001
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: agents
    description: Agent instance management and lifecycle
  - name: templates
    description: Agent template management
  - name: registry
    description: Database-backed template and instance registry
  - name: sandbox
    description: Container spawning and execution
  - name: lifecycle
    description: Agent lifecycle operations (capabilities, worktrees, permissions)
  - name: tasks
    description: Per-agent task queue (Stories 5.8/5.9)
  - name: auth
    description: Authentication, API keys, OIDC
  - name: secrets
    description: Secret management (Epic 16)
  - name: delegation
    description: Agent identity and delegation (Epic 17)
  - name: chat
    description: Chat messaging and sessions
  - name: intercom
    description: Centrifugo pub/sub and real-time messaging
  - name: circles
    description: Circle management and coordination (Epic 10)
  - name: knowledge
    description: Git-backed circle knowledge (Story 8.8)
  - name: memory
    description: Memory blocks and scoped agent memory (Epic 8)
  - name: llm
    description: LLM proxy and model listing
  - name: providers
    description: LLM provider management
  - name: budget
    description: Token usage and budget enforcement
  - name: metering
    description: Usage aggregation and summaries
  - name: audit
    description: Merkle hash-chain audit trail (Epic 11)
  - name: schedules
    description: Cron and one-shot scheduling (Epic 11)
  - name: skills
    description: Skill and tool registry
  - name: mcp
    description: MCP server management
  - name: pipelines
    description: Sequential/parallel orchestration pipelines
  - name: notifications
    description: Notification channels and routing (Epic 18)
  - name: channels
    description: Integration channel management (Epic 18)
  - name: webhooks
    description: Inbound webhook triggers (Story 9.8)
  - name: health
    description: System health checks
  - name: federation
    description: Federation (stub)
  - name: lsp
    description: Language Server Protocol helpers
  - name: openai-compat
    description: OpenAI-compatible chat endpoint

paths:
  # ── Agents ─────────────────────────────────────────────────────────────────
  /api/agents:
    get:
      tags: [agents]
      summary: List all agent instances (enriched with template + live status)
      operationId: listAgentsEnriched
      responses:
        '200':
          description: List of enriched agent instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnrichedAgentInstance'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/templates:
    get:
      tags: [agents]
      summary: List all agent templates
      operationId: listAgentTemplates
      responses:
        '200':
          description: List of agent templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTemplateDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/instances:
    get:
      tags: [agents]
      summary: List agent instances (filterable by circle/status)
      operationId: listAgentInstances
      parameters:
        - name: circle
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of agent instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentInstanceDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [agents]
      summary: Create new agent instance from template
      operationId: createAgentInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateRef, name]
              properties:
                templateRef:
                  type: string
                name:
                  type: string
                displayName:
                  type: string
                circle:
                  type: string
                overrides:
                  type: object
                lifecycleMode:
                  type: string
                  enum: [persistent, ephemeral]
                start:
                  type: boolean
      responses:
        '201':
          description: Agent instance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInstanceDb'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/instances/{id}:
    get:
      tags: [agents]
      summary: Get agent instance detail
      operationId: getAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent instance detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInstanceDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [agents]
      summary: Update an agent instance (overrides, name, display_name, etc.)
      operationId: updateAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                displayName:
                  type: string
                circle:
                  type: string
                lifecycleMode:
                  type: string
                  enum: [persistent, ephemeral]
                overrides:
                  type: object
      responses:
        '200':
          description: Agent instance updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInstanceDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [agents]
      summary: Delete agent instance
      operationId: deleteAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Agent instance deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/agents/instances/{id}/start:
    post:
      tags: [agents]
      summary: Start an agent instance
      operationId: startAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent instance started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInstanceDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/agents/instances/{id}/stop:
    post:
      tags: [agents]
      summary: Stop an agent instance
      operationId: stopAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent instance stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInstanceDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/agents/instances/{id}/thoughts:
    get:
      tags: [agents]
      summary: Get agent thoughts/execution logs
      operationId: getAgentThoughts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of thoughts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/message:
    post:
      tags: [agents]
      summary: Send direct message to agent
      operationId: sendMessageToAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, payload]
              properties:
                from:
                  type: string
                payload:
                  type: object
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/validate:
    post:
      tags: [agents]
      summary: Validate an agent manifest
      operationId: validateAgentManifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/test-chat:
    post:
      tags: [agents]
      summary: Test-chat with agent manifest (no container spawn)
      operationId: testChatWithAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest, message]
              properties:
                manifest:
                  $ref: '#/components/schemas/AgentManifest'
                message:
                  type: string
                history:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                  thought:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ── Agent Lifecycle ────────────────────────────────────────────────────────
  /api/agents/{id}/resolve-capabilities:
    post:
      tags: [lifecycle]
      summary: Dry-run capability resolution (Story 3.2)
      operationId: resolveAgentCapabilities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolved capabilities
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          description: Capability escalation error
  /api/agents/{id}/worktree/merge:
    post:
      tags: [lifecycle]
      summary: Merge agent worktree to target branch (Story 3.4)
      operationId: mergeAgentWorktree
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repoPath]
              properties:
                repoPath:
                  type: string
                targetBranch:
                  type: string
      responses:
        '200':
          description: Worktree merged
          content:
            application/json:
              schema:
                type: object
                properties:
                  merged:
                    type: boolean
                  branch:
                    type: string
                  targetBranch:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/worktree:
    delete:
      tags: [lifecycle]
      summary: Delete agent worktree (Story 3.4)
      operationId: deleteAgentWorktree
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repoPath]
              properties:
                repoPath:
                  type: string
      responses:
        '200':
          description: Worktree deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/logs:
    get:
      tags: [lifecycle]
      summary: Get container logs (Story 3.5)
      operationId: getAgentContainerLogs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tail
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Container logs
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/agents/{id}/cleanup:
    post:
      tags: [lifecycle]
      summary: Cleanup stopped agent instance (Story 3.7)
      operationId: cleanupAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Instance cleaned up
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleaned:
                    type: boolean
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/subagents:
    get:
      tags: [lifecycle]
      summary: List subagents spawned by this agent (Story 3.8)
      operationId: listAgentSubagents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of subagents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentInstanceDb'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/permission-request:
    post:
      tags: [lifecycle]
      summary: Request capability grant (Story 3.9)
      operationId: requestAgentPermission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dimension, value]
              properties:
                dimension:
                  type: string
                  enum: [filesystem, network, exec.commands]
                value:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Permission request created
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/grants:
    get:
      tags: [lifecycle]
      summary: List capability grants for agent
      operationId: listAgentGrants
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of grants
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    type: array
                    items:
                      type: object
                  persistent:
                    type: array
                    items:
                      $ref: '#/components/schemas/CapabilityGrant'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [lifecycle]
      summary: Create a capability grant (operator-initiated)
      operationId: createAgentGrant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dimension, value]
              properties:
                dimension:
                  type: string
                value:
                  type: string
                grantType:
                  type: string
                  enum: [one-time, session, persistent]
                expiresAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Grant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityGrant'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/grants/{grantId}:
    delete:
      tags: [lifecycle]
      summary: Revoke capability grant
      operationId: revokeAgentGrant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: grantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grant revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
                  type:
                    type: string
                    enum: [session, persistent]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/restart:
    post:
      tags: [lifecycle]
      summary: Restart persistent agent
      operationId: restartAgentInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent restarted
          content:
            application/json:
              schema:
                type: object
                properties:
                  restarted:
                    type: boolean
                  agentName:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Only persistent agents can be restarted
  /api/permission-requests:
    get:
      tags: [lifecycle]
      summary: List pending permission requests
      operationId: listPermissionRequests
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/permission-requests/{requestId}/decision:
    post:
      tags: [lifecycle]
      summary: Approve or deny permission request
      operationId: decidePermissionRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [grant, deny]
                grantType:
                  type: string
                  enum: [one-time, session, persistent]
                expiresAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Decision recorded
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ── Agent Heartbeat ────────────────────────────────────────────────────────
  /api/agents/{id}/heartbeat:
    post:
      tags: [agents]
      summary: Agent container heartbeat (JWT auth)
      operationId: agentHeartbeat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Heartbeat recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Token agentId does not match URL
  /api/agents/health:
    get:
      tags: [agents]
      summary: List unhealthy agent instances
      operationId: listUnhealthyAgents
      responses:
        '200':
          description: List of unhealthy instances
          content:
            application/json:
              schema:
                type: object
                properties:
                  unhealthy:
                    type: array
                    items:
                      type: object
                      properties:
                        instanceId:
                          type: string
                        lastSeen:
                          type: string
                          format: date-time
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ── Tasks ──────────────────────────────────────────────────────────────────
  /api/agents/{id}/tasks:
    get:
      tags: [tasks]
      summary: List tasks for agent (filterable by status)
      operationId: listAgentTasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [tasks]
      summary: Enqueue task for agent
      operationId: enqueueAgentTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:
                  type: string
                context:
                  type: object
                priority:
                  type: integer
                maxRetries:
                  type: integer
      responses:
        '201':
          description: Task enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                  status:
                    type: string
                  priority:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/agents/{id}/tasks/next:
    get:
      tags: [tasks]
      summary: Worker polls for next queued task
      operationId: getNextTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Next task
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                  task:
                    type: string
                  context:
                    type: object
                  priority:
                    type: integer
                  retryCount:
                    type: integer
                  maxRetries:
                    type: integer
        '204':
          description: No task available
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Agent already has a running task
  /api/agents/{id}/tasks/{taskId}:
    get:
      tags: [tasks]
      summary: Get task detail
      operationId: getTaskDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [tasks]
      summary: Update task priority
      operationId: updateTaskPriority
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priority]
              properties:
                priority:
                  type: integer
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                  priority:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [tasks]
      summary: Cancel a queued task
      operationId: cancelTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                  status:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/agents/{id}/tasks/{taskId}/complete:
    post:
      tags: [tasks]
      summary: Worker submits task result
      operationId: completeTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: string
                error:
                  type: string
                usage:
                  type: object
                thoughtStream:
