[package]
name = "sera-tools"
version.workspace = true
edition.workspace = true

[dependencies]
sera-types = { workspace = true }
sera-errors = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
sha2 = "0.10"
hex = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }

# Correction catalog (tool-layer reinforcement)
regex = { workspace = true }
serde_yaml = { workspace = true }
notify = { workspace = true }
notify-debouncer-mini = { workspace = true }
dirs = { workspace = true }

# LSP phase 1 — get_symbols_overview
async-lsp = { workspace = true }
lsp-types = { workspace = true }
dashmap   = { workspace = true }
url       = { workspace = true }
which     = { workspace = true }

# Feature-gated
bollard = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }

[features]
default = ["docker"]
docker = ["dep:bollard", "dep:futures-util"]
wasm = []
microvm = []
external = []
openshell = []
# Enable live HTTP fetching in knowledge-ingest (requires reqwest in deps).
http_fetch = []
# Enable tests that spawn a real language server (rust-analyzer) — skipped in CI.
integration = []

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "time"] }
tempfile = { workspace = true }
proptest = { workspace = true }
