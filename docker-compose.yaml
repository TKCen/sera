services:
  sera-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: sera-core
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./memory:/app/memory
      - ./core/config:/app/config
      - ./workspaces:/workspaces
      - ./agents:/agents:ro
      - ./circles:/circles:ro
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sera_user:sera_pass@sera-db:5432/sera_db
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - QDRANT_URL=http://qdrant:6333
      - LLM_BASE_URL=${LLM_BASE_URL:-http://litellm:4000/v1}
      - LLM_API_KEY=${LITELLM_MASTER_KEY:-lm-studio}
      - HOST_WORKSPACES_DIR=${PWD}/workspaces
    ports:
      - "3001:3001"
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      sera-db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      litellm:
        condition: service_healthy
    command: node dist/index.js

  sera-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sera-web
    restart: unless-stopped
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_CENTRIFUGO_URL=ws://localhost:10001/connection/websocket
      - CORE_API_URL=http://sera-core:3001
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      sera-core:
        condition: service_healthy

  centrifugo:
    image: centrifugo/centrifugo:latest
    container_name: sera-centrifugo
    restart: unless-stopped
    ports:
      - "10001:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    networks:
      - sera_net
    healthcheck:
      test: ["CMD", "centrifugo", "check", "--config", "/centrifugo/config.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  sera-db:
    image: pgvector/pgvector:pg15
    container_name: sera-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sera_user
      - POSTGRES_PASSWORD=sera_pass
      - POSTGRES_DB=sera_db
    volumes:
      - sera_db_data:/var/lib/postgresql/data
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sera_user -d sera_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sera-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: sera-litellm
    restart: unless-stopped
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://sera_user:sera_pass@sera-db:5432/sera_db
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.settimeout(5); s.connect((\"127.0.0.1\", 4000))' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  sera_net:
    name: sera_net
    driver: bridge
  agent_net:
    name: agent_net
    external: true

volumes:
  sera_db_data:
  qdrant_data:
