services:
  sera-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: sera-core
    restart: unless-stopped
    volumes:
      - .:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ./memory:/app/memory
      - ./core/config:/app/config
    environment:
      - NODE_ENV=development
      - WORKSPACE_DIR=/app/workspace
      - DATABASE_URL=postgresql://sera_user:sera_pass@sera-db:5432/sera_db
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - QDRANT_URL=http://qdrant:6333
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-lm-studio}
      - LLM_MODEL=${LLM_MODEL:-model-identifier}
    ports:
      - "3001:3001"
    networks:
      - sera_net
      - agent_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      sera-db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: node dist/index.js

  sera-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sera-web
    restart: unless-stopped
    # Port 3000 is internal, NPM will proxy to it.
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_CENTRIFUGO_URL=ws://localhost:10001/connection/websocket
      - CORE_API_URL=http://sera-core:3001
    labels:
      - "homepage.group=AI Agents"
      - "homepage.name=SERA"
      - "homepage.icon=devicon-robot"
      - "homepage.description=Sandboxed Extensible Reasoning Agent"
      - "homepage.href=http://sera.localhost"
      - "homepage.widget.type=custom"
      - "homepage.widget.url=http://sera-web:3000/api/health"
    networks:
      - sera_net
      - agent_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      sera-core:
        condition: service_healthy

  centrifugo:
    image: centrifugo/centrifugo:latest
    container_name: sera-centrifugo
    restart: unless-stopped
    ports:
      - "10001:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    networks:
      - sera_net
      - agent_net

  sera-db:
    image: pgvector/pgvector:pg15
    container_name: sera-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sera_user
      - POSTGRES_PASSWORD=sera_pass
      - POSTGRES_DB=sera_db
    volumes:
      - sera_db_data:/var/lib/postgresql/data
    networks:
      - sera_net
      - agent_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sera_user -d sera_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sera-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sera_net
      - agent_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  sera_net:
    name: sera_net
    driver: bridge
  agent_net:
    external: true

volumes:
  sera_db_data:
  qdrant_data:
