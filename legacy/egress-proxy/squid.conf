# ─────────────────────────────────────────────────────────────────────────────
# SERA Egress Proxy — Squid Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This is the base Squid config for the sera-egress-proxy container.
# It provides domain-based HTTPS filtering via CONNECT tunnel inspection,
# per-agent ACLs, structured JSON access logging, and bandwidth rate limiting.
#
# See: docs/epics/20-egress-proxy.md
# ─────────────────────────────────────────────────────────────────────────────

# ── Listening ────────────────────────────────────────────────────────────────
# Explicit forward proxy — agents connect via HTTP_PROXY/HTTPS_PROXY env vars.
# HTTPS traffic arrives as CONNECT tunnels; Squid sees the target hostname from
# the CONNECT request and applies dstdomain ACLs without any TLS interception.
http_port 3128

# ── DNS ──────────────────────────────────────────────────────────────────────
dns_nameservers 127.0.0.11

# ── Per-agent ACLs ───────────────────────────────────────────────────────────
# sera-core generates per-agent ACL files and a master include.
# The master include file lists all active agent ACLs.
# Must come BEFORE the default deny — Squid processes rules top-down.
# The file is managed by EgressAclManager; created empty on first boot.
include /etc/squid/acls/agents.conf

# ── Default deny ─────────────────────────────────────────────────────────────
# Block everything not explicitly allowed by a per-agent ACL above.
http_access deny all

# ── Logging — structured JSON ────────────────────────────────────────────────
logformat squid-json {"timestamp":"%{%Y-%m-%dT%H:%M:%S%z}tl","src_ip":"%>a","method":"%rm","url":"%ru","domain":"%>rd","status":%>Hs,"bytes":%<st,"duration_ms":%<tt}
access_log stdio:/var/log/squid/access.log squid-json

# Disable cache log and store log to reduce noise
cache_log /dev/null
cache_store_log none

# ── Cache — disabled ─────────────────────────────────────────────────────────
# SERA agents should see live responses; caching would hide state changes.
cache deny all

# ── Resource limits ──────────────────────────────────────────────────────────
# Sensible defaults for homelab scale
maximum_object_size 50 MB
client_request_buffer_max_size 10 MB
reply_body_max_size 50 MB
connect_timeout 30 seconds
read_timeout 120 seconds
request_timeout 120 seconds

# Maximum open file descriptors
max_filedescriptors 4096

# ── Forwarded headers ────────────────────────────────────────────────────────
# Strip Via and X-Forwarded-For for privacy — agents should not leak proxy info
via off
forwarded_for delete

# ── PID file ─────────────────────────────────────────────────────────────────
pid_filename /var/run/squid/squid.pid

# ── Shutdown ─────────────────────────────────────────────────────────────────
shutdown_lifetime 5 seconds
