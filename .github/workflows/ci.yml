name: CI — Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # Node.js still needed: vitest runs on Node, tsc requires it
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

  label-agent-pr:
    if: >-
      github.event_name == 'pull_request' &&
      (startsWith(github.head_ref, 'claude/') ||
       startsWith(github.head_ref, 'jules/') ||
       startsWith(github.head_ref, 'gemini/') ||
       startsWith(github.head_ref, 'antigravity/'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['agent-work']
            });
