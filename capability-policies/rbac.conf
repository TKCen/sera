# SERA RBAC model — domain-tenanted role-based access control.
# Used by DefaultAuthzProvider for Tier 2+ deployments.
# See SPEC-identity-authz §5.3.

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && (p.obj == "*" || r.obj == p.obj || keyMatch(r.obj, p.obj)) && (p.act == "*" || r.act == p.act)
