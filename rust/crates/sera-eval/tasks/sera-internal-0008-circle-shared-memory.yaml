  memory_seed:
    - role: system
      content: "Circle fact: the project ships on Fridays."
  skills: []
  sandbox_tier: 1
input:
  prompt: "When does this project ship?"
expected:
  assertions:
    - kind: contains_any
      values: ["Friday", "Fridays"]
    - kind: not_contains
      values: ["I don't know", "cannot determine"]
