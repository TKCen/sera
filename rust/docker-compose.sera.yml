# docker-compose for the sera gateway + runtime stack.
#
# Prerequisites:
#   1. Copy sera.yaml.example to sera.yaml (or mount your own)
#   2. Set DISCORD_TOKEN in .env or export it
#   3. LM Studio (or any OpenAI-compatible endpoint) running on the host
#
# Usage:
#   docker compose -f rust/docker-compose.sera.yml up --build

services:
  sera:
    build:
      context: ..
      dockerfile: rust/Dockerfile.sera
      cache:
        - type: volume
          source: sera-cargo-registry
          target: /root/.cargo/registry
        - type: volume
          source: sera-cargo-cache
          target: /root/.cargo/cache
        - type: volume
          source: sera-sccache-cache
          target: /build/.sccache
    volumes:
      - ./sera.yaml:/app/sera.yaml:ro
      - sera-data:/app/data
      - /home/entity/.sera/secrets:/app/secrets:ro
    environment:
      - SERA_API_KEY=${SERA_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-info}
      - SERA_RUNTIME_BIN=/usr/local/bin/sera-runtime
    # Bridge networking so published ports reach the host on WSL2 Docker Desktop.
    # (network_mode: host binds to the Docker Desktop VM netns, not the WSL2
    # distro, so `ports:` is ignored and host curl to localhost:3001 times out.)
    # LM Studio on the host is reached via host.docker.internal (see sera.yaml).
    #
    # Publish on both IPv4 and IPv6: Windows 11 resolves `localhost` to `::1`
    # first, so an IPv4-only publish makes `curl localhost:3001` from the
    # Windows host time out even though 127.0.0.1:3001 works.
    ports:
      - "0.0.0.0:3001:3001"
      - "[::]:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  sera-data:
  sera-cargo-registry:
  sera-cargo-cache:
  sera-sccache-cache:
