services:
  # ── Agent Worker Image ──────────────────────────────────────────────────────
  # Image used by SandboxManager when spawning agent containers.
  # Not a running service — built here so `docker compose build` includes it.
  sera-agent-worker:
    build:
      context: ./core
      dockerfile: sandbox/Dockerfile.worker
    image: sera-agent-worker:latest
    # No ports, no restart — this image is spawned on-demand by SandboxManager.
    profiles:
      - build-only

  sera-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: sera-core
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./memory:/app/memory
      - ./core/config:/app/config
      - ./workspaces:/workspaces
      - ./agents:/workspace/agents:ro
      - ./circles:/workspace/circles:ro
      - ./templates:/workspace/templates:ro
      - ./lists:/workspace/lists:ro
      - ./capability-policies:/workspace/capability-policies:ro
      - ./sandbox-boundaries:/workspace/sandbox-boundaries:ro
      - ./egress-proxy/acls:/egress/acls
      - egress_logs:/egress/logs:ro
    environment:
      - WORKSPACE_DIR=/workspace
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sera_user:sera_pass@sera-db:5432/sera_db
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - QDRANT_URL=http://qdrant:6333
      # ── LLM provider bootstrap ──────────────────────────────────────────────
      # Provider routing is driven by core/config/providers.json.
      # The env vars below bootstrap a single default provider when no entry in
      # providers.json matches LLM_MODEL — handy for single-provider setups.
      #
      # Local LM Studio:  LLM_BASE_URL=http://host.docker.internal:1234/v1
      # Local Ollama:     LLM_BASE_URL=http://host.docker.internal:11434/v1
      # Cloud providers are auto-detected by model name prefix (gpt-*, claude-*,
      # gemini-*, …) — set OPENAI_API_KEY / ANTHROPIC_API_KEY as needed.
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-lm-studio}
      - LLM_MODEL=${LLM_MODEL:-lmstudio-local}
      - HOST_WORKSPACES_DIR=${PWD}/workspaces
      - EGRESS_PROXY_URL=http://sera-egress-proxy:3128
      # Set OLLAMA_URL to enable local embeddings, e.g.:
      # - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      sera-db:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  sera-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sera-web
    restart: unless-stopped
    networks:
      - sera_net
      - agent_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      sera-core:
        condition: service_healthy

  centrifugo:
    image: centrifugo/centrifugo:latest
    container_name: sera-centrifugo
    restart: unless-stopped
    ports:
      - "10001:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    networks:
      - sera_net
    healthcheck:
      test: ["CMD", "centrifugo", "check", "--config", "/centrifugo/config.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  sera-db:
    image: pgvector/pgvector:pg15
    container_name: sera-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sera_user
      - POSTGRES_PASSWORD=sera_pass
      - POSTGRES_DB=sera_db
    ports:
      - "5432:5432"
    volumes:
      - sera_db_data:/var/lib/postgresql/data
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sera_user -d sera_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sera-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Egress Proxy ───────────────────────────────────────────────────────────
  # Squid forward proxy on agent_net — enforces per-agent domain allowlists
  # via SNI-based HTTPS filtering (no TLS MITM). See docs/epics/20-egress-proxy.md.
  sera-egress-proxy:
    build:
      context: ./egress-proxy
      dockerfile: Dockerfile
    container_name: sera-egress-proxy
    restart: unless-stopped
    volumes:
      - ./egress-proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./egress-proxy/acls:/etc/squid/acls
      - egress_logs:/var/log/squid
    networks:
      - sera_net
      - agent_net
    labels:
      sera.proxy: egress
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  sera_net:
    name: sera_net
    driver: bridge
  agent_net:
    name: agent_net
    driver: bridge

volumes:
  sera_db_data:
  qdrant_data:
  egress_logs:
