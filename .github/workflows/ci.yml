name: CI — Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      # Node.js still needed: vitest runs on Node, tsc requires it
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      # bun.lock records only the dev platform's optional deps (Windows).
      # Ensure the Linux native binding for Tailwind CSS is present.
      - name: Ensure Tailwind native bindings
        run: bun add --no-save @tailwindcss/oxide-linux-x64-gnu@4.2.1

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

  validate-rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Check
        run: cd rust && cargo check --workspace

      - name: Clippy
        run: cd rust && cargo clippy --workspace -- -D warnings

      - name: Test
        run: cd rust && cargo test --workspace

  label-agent-pr:
    if: >-
      github.event_name == 'pull_request' &&
      (startsWith(github.head_ref, 'claude/') ||
       startsWith(github.head_ref, 'jules/') ||
       startsWith(github.head_ref, 'gemini/') ||
       startsWith(github.head_ref, 'antigravity/'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['agent-work']
            });
