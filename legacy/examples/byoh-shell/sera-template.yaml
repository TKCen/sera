apiVersion: sera/v1
kind: AgentTemplate
metadata:
  name: byoh-shell-example
  displayName: BYOH Shell Example
  icon: "🐚"
  builtin: false
  category: examples
  description: "Minimal POSIX shell agent demonstrating the BYOH contract"
spec:
