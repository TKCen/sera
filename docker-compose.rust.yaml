# ── SERA 2.0 Rust Stack ───────────────────────────────────────────────────────
# Brings up the full Rust-native SERA stack:
#   postgres (pgvector) + centrifugo + ollama + sera-gateway
#
# Usage:
#   docker compose -f docker-compose.rust.yaml up --build
#
# Host port assignments (chosen to avoid collisions on dev machine):
#   5434  → postgres:5432       (5432 = hindsight-db internal, 5433 = radio-player)
#   8001  → centrifugo:8000     (8000 = portainer internal, 8100 = radio-player centrifugo)
#   11435 → ollama:11434        (11434 = local ollama on 127.0.0.1)
#   3001  → sera-gateway:3001

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: sera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sera
      POSTGRES_PASSWORD: sera
      POSTGRES_DB: sera
    volumes:
      - sera_pg_data:/var/lib/postgresql
    ports:
      - "5434:5432"
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sera -d sera"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: sera-centrifugo
    restart: unless-stopped
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "8001:8000"
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: sera-ollama
    restart: unless-stopped
    volumes:
      - sera_ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    networks:
      - sera_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: sera-ollama-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "ollama pull nomic-embed-text && echo 'nomic-embed-text pulled'"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - sera_net
    depends_on:
      ollama:
        condition: service_healthy

  sera-gateway:
    build:
      context: ./rust
      dockerfile: Dockerfile
    container_name: sera-gateway
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sera:sera@postgres:5432/sera
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-sera-api-key}
      OLLAMA_BASE_URL: http://ollama:11434
      SERA_LOG_DIR: /app/logs
      SERA_BOOTSTRAP_API_KEY: ${SERA_BOOTSTRAP_API_KEY:-sera_bootstrap_dev_123}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - sera_logs:/app/logs
    ports:
      - "3001:3001"
    networks:
      - sera_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_healthy

volumes:
  sera_pg_data:
  sera_ollama_data:
  sera_logs:

networks:
  sera_net:
    driver: bridge
